<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login</title>
</head>

<body>
    <div class="login-page">
        <div class="visual-panel">
            <mat-icon>timer</mat-icon>
            <h1>In<span>Out</span></h1>
        </div>

        <mat-card class="login-card">
            <mat-card-header>
                <mat-card-title>Ingresar</mat-card-title>
            </mat-card-header>

            <mat-card-content>
                <mat-form-field appearance="outline">
                    <mat-label>Usuario</mat-label>
                    <input matInput [(ngModel)]="username" name="user">
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Contraseña</mat-label>
                    <input matInput type="password" [(ngModel)]="password" name="pass">
                </mat-form-field>

                @if (errorMessage()) {
                <p class="error-msg">{{ errorMessage() }}</p>
                }

                <button mat-raised-button color="primary" (click)="login()">Ingresar</button>
            </mat-card-content>
        </mat-card>
    </div>
</body>

</html>
