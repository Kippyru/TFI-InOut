<div class="login-page">
    <div class="visual-panel">
        <mat-icon>timer</mat-icon>
        <h1>In<span>Out</span></h1>
    </div>

    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>{{ t('login.title') }}</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <mat-form-field appearance="outline">
                <mat-label>{{ t('login.username') }}</mat-label>
                <input matInput [(ngModel)]="username" name="user">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>{{ t('login.password') }}</mat-label>
                <input matInput type="password" [(ngModel)]="password" name="pass">
            </mat-form-field>

            @if (errorMessage()) {
            <p class="error-msg">{{ t(errorMessage()) }}</p>
            }

            <button mat-raised-button color="primary" (click)="login()">{{ t('login.button') }}</button>
        </mat-card-content>
    </mat-card>
</div>
