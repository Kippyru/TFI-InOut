<mat-toolbar>
    <button matIconButton class="example-icon" aria-label="Menu" [matTooltip]="t('app.title')"
        matTooltipPosition="below" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
    </button>
    <span>{{ t('app.title') }}</span>
    <span class="example-spacer"></span>

    <button matIconButton class="example-icon" [attr.aria-label]="t('app.logout')" [matTooltip]="t('app.logout')" matTooltipPosition="below"
        (click)="logout()">
        <mat-icon>logout</mat-icon>
    </button>
</mat-toolbar>

<mat-drawer-container class="example-container">
    <mat-drawer mode="side" opened #drawer
    [mode]="isMobile() ? 'over' : 'side' "
    [opened]="!isMobile()"
    position="start"
    >
        <app-drawer-menu />
    </mat-drawer>
    <mat-drawer-content style="padding: 5px">
        <router-outlet />
    </mat-drawer-content>
</mat-drawer-container>
