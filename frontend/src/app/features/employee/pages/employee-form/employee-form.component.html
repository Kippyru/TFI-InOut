<div class="form-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Editar Empleado' : 'Crear Empleado' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="employee-form">
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="name" placeholder="Ej. John">
            <mat-error *ngIf="employeeForm.get('name')?.hasError('required')">El nombre es requerido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Apellido</mat-label>
            <input matInput formControlName="lastName" placeholder="Ej. Spring">
            <mat-error *ngIf="employeeForm.get('lastName')?.hasError('required')">El apellido es requerido</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Rol</mat-label>
            <mat-select formControlName="role">
              <mat-option *ngFor="let role of roles" [value]="role.id">
                {{ role.name }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="employeeForm.get('role')?.hasError('required')">El rol es requerido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>N° Empleado</mat-label>
            <input matInput formControlName="numberEmployee" placeholder="Ej. 1234">
            <mat-error *ngIf="employeeForm.get('numberEmployee')?.hasError('required')">El número de empleado es requerido</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>CUIL</mat-label>
            <input matInput formControlName="cuil" placeholder="Ej. 20123456784">
            <mat-error *ngIf="employeeForm.get('cuil')?.hasError('required')">El CUIL es requerido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>DNI</mat-label>
            <input matInput formControlName="dni" placeholder="Ej. 12345678">
            <mat-error *ngIf="employeeForm.get('dni')?.hasError('required')">El DNI es requerido</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Notas / Estado Adicional</mat-label>
            <textarea matInput formControlName="state" placeholder="Ej. De vacaciones..." rows="3"></textarea>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="..">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="employeeForm.invalid">
            Guardar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
