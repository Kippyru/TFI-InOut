<div class="employee-list-container">
  <div class="header">
    <h2>Empleados</h2>
    <button mat-raised-button color="primary" routerLink="create">
      <mat-icon>add</mat-icon> Agregar Empleado
    </button>
  </div>

  <table mat-table [dataSource]="employees" class="mat-elevation-z8 employee-table">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Last Name Column -->
    <ng-container matColumnDef="lastName">
      <th mat-header-cell *matHeaderCellDef> Apellido </th>
      <td mat-cell *matCellDef="let element"> {{element.lastName}} </td>
    </ng-container>

    <!-- Role Column -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef> Rol </th>
      <td mat-cell *matCellDef="let element"> {{getRoleName(element.role)}} </td>
    </ng-container>

    <!-- Number Column -->
    <ng-container matColumnDef="numberEmployee">
      <th mat-header-cell *matHeaderCellDef> N° Empleado </th>
      <td mat-cell *matCellDef="let element"> {{element.numberEmployee}} </td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let element">
        <span [class.active]="element.active == 1 || element.active === true || element.active === '1'" 
              [class.inactive]="element.active == 0 || element.active === false || element.active === '0'">
          {{ (element.active == 1 || element.active === true || element.active === '1') ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button color="primary" [routerLink]="[element.id]" title="Ver">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="accent" [routerLink]="[element.id, 'edit']" title="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" *ngIf="element.active == 1 || element.active === true || element.active === '1'" (click)="deleteEmployee(element.id)"
          title="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button class="restore-btn" *ngIf="element.active == 0 || element.active === false || element.active === '0'" (click)="restoreEmployee(element.id)"
          title="Restaurar">
          <mat-icon>restore</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
