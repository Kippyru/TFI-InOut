<h2 mat-dialog-title>Detalles: {{data.scheduleName}}</h2>
<mat-dialog-content>
  <div *ngIf="loading" class="loading-state">
    <mat-spinner diameter="30"></mat-spinner>
  </div>

  <table mat-table [dataSource]="details" *ngIf="!loading && details.length > 0" class="mat-elevation-z2">
    <!-- Day Column -->
    <ng-container matColumnDef="day">
      <th mat-header-cell *matHeaderCellDef> Día </th>
      <td mat-cell *matCellDef="let element"> {{element.day}} </td>
    </ng-container>

    <!-- Check In Column -->
    <ng-container matColumnDef="checkIn">
      <th mat-header-cell *matHeaderCellDef> Entrada </th>
      <td mat-cell *matCellDef="let element"> 
        <ng-container *ngIf="editingId !== element.id">
          {{element.checkIn | slice:0:5}} 
        </ng-container>
        <ng-container *ngIf="editingId === element.id">
          <form [formGroup]="editForm">
            <input type="time" formControlName="checkIn" class="edit-input">
          </form>
        </ng-container>
      </td>
    </ng-container>

    <!-- Check Out Column -->
    <ng-container matColumnDef="checkOut">
      <th mat-header-cell *matHeaderCellDef> Salida </th>
      <td mat-cell *matCellDef="let element"> 
        <ng-container *ngIf="editingId !== element.id">
          {{element.checkOut | slice:0:5}} 
        </ng-container>
        <ng-container *ngIf="editingId === element.id">
          <form [formGroup]="editForm">
            <input type="time" formControlName="checkOut" class="edit-input">
          </form>
        </ng-container>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let element">
        <ng-container *ngIf="editingId !== element.id">
          <button mat-icon-button color="primary" (click)="startEdit(element)" matTooltip="Editar horario">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteDetail(element.id)" matTooltip="Eliminar día">
            <mat-icon>delete</mat-icon>
          </button>
        </ng-container>
        <ng-container *ngIf="editingId === element.id">
          <button mat-icon-button color="primary" (click)="saveEdit(element)" [disabled]="editForm.invalid" matTooltip="Guardar">
            <mat-icon>check</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="cancelEdit()" matTooltip="Cancelar">
            <mat-icon>close</mat-icon>
          </button>
        </ng-container>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <div *ngIf="!loading && details.length === 0" class="no-data">
    No hay días configurados en este turno.
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()">Cerrar</button>
</mat-dialog-actions>
