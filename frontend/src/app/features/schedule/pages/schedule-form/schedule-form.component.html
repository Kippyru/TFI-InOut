<div class="form-container">
  <div class="header">
    <h1>{{ isEditMode ? 'Editar Turno' : 'Nuevo Turno' }}</h1>
    <button mat-icon-button routerLink="..">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </div>

  <div *ngIf="loadingData" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Cargando datos del turno...</p>
  </div>

  <mat-card *ngIf="!loadingData">
    <mat-card-content>
      <form [formGroup]="scheduleForm" (ngSubmit)="onSubmit()" class="schedule-form">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre del Turno</mat-label>
          <input matInput formControlName="name" placeholder="Ej: Mañana, Tarde, Rotativo">
          <mat-error *ngIf="scheduleForm.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Horas de Trabajo Semanales</mat-label>
          <input matInput type="number" formControlName="hourWork" placeholder="Ej: 40">
          <mat-error *ngIf="scheduleForm.get('hourWork')?.hasError('required')">Requerido</mat-error>
          <mat-error *ngIf="scheduleForm.get('hourWork')?.hasError('min')">Debe ser mayor a 0</mat-error>
        </mat-form-field>

        <div class="row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Tolerancia de Entrada (minutos)</mat-label>
            <input matInput type="number" formControlName="checkInTolerance">
            <mat-error *ngIf="scheduleForm.get('checkInTolerance')?.hasError('required')">Requerido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Tolerancia de Salida (minutos)</mat-label>
            <input matInput type="number" formControlName="checkOutTolerance">
            <mat-error *ngIf="scheduleForm.get('checkOutTolerance')?.hasError('required')">Requerido</mat-error>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-button type="button" routerLink="..">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="scheduleForm.invalid || loading">
            <mat-icon *ngIf="!loading">save</mat-icon>
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            {{ isEditMode ? 'Actualizar' : 'Guardar' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
