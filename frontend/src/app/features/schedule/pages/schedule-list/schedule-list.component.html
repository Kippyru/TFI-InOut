<div class="list-container">
  <div class="header">
    <h1>Gestión de Turnos</h1>
    <button mat-raised-button color="primary" routerLink="create">
      <mat-icon>add</mat-icon> Nuevo Turno
    </button>
  </div>

  <div *ngIf="loading" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Cargando turnos...</p>
  </div>

  <mat-card *ngIf="!loading">
    <table mat-table [dataSource]="schedules" class="mat-elevation-z8" *ngIf="schedules.length > 0; else noData">
      
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.id}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Nombre </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Hour Work Column -->
      <ng-container matColumnDef="hourWork">
        <th mat-header-cell *matHeaderCellDef> Horas (Semana) </th>
        <td mat-cell *matCellDef="let element"> {{element.hourWork}} hs </td>
      </ng-container>

      <!-- Tolerances Column -->
      <ng-container matColumnDef="tolerances">
        <th mat-header-cell *matHeaderCellDef> Tolerancia (Ent/Sal) </th>
        <td mat-cell *matCellDef="let element"> {{element.checkInTolerance}}m / {{element.checkOutTolerance}}m </td>
      </ng-container>

      <!-- State Column -->
      <ng-container matColumnDef="state">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let element"> {{element.state}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="addDetail(element)" matTooltip="Agregar Días/Horarios">
            <mat-icon>calendar_today</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="viewDetails(element)" matTooltip="Ver Días Configurados">
            <mat-icon>list</mat-icon>
          </button>
          <button mat-icon-button color="accent" [routerLink]="[element.id, 'edit']" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteSchedule(element.id)" matTooltip="Dar de baja" *ngIf="element.state !== 'INACTIVO'">
            <mat-icon>delete</mat-icon>
          </button>
          <button mat-icon-button color="primary" (click)="restoreSchedule(element.id)" matTooltip="Restaurar" *ngIf="element.state === 'INACTIVO'">
            <mat-icon>restore</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{'inactive-row': row.state === 'INACTIVO'}"></tr>
    </table>

    <ng-template #noData>
      <div class="no-data">
        <p>No hay turnos registrados.</p>
      </div>
    </ng-template>
  </mat-card>
</div>
